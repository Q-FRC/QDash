name: Check Formatting

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  checks:
    runs-on: main
    steps:
      - uses: actions/checkout@v4

      - name: Format
        run: .ci/format.sh

      - name: Check diff
        run: git --no-pager diff --exit-code HEAD
